name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python3 -m pip install .

      - name: Install dev dependencies
        run: python3 -m pip install -e '.[dev]'

      - name: Run tests
        run: python3 -m pytest -q

      - name: Run lint
        run: python3 -m ruff check src tests

      - name: CLI smoke workflow
        run: |
          if command -v failure-lab >/dev/null 2>&1; then
            failure-lab demo
            failure-lab datasets list
            failure-lab run --dataset reasoning-failures-v1 --model demo
            RUN_ID="$(ls runs | sort | tail -n 1)"
            failure-lab report --run "$RUN_ID"
          else
            python3 -m model_failure_lab demo
            python3 -m model_failure_lab datasets list
            python3 -m model_failure_lab run --dataset reasoning-failures-v1 --model demo
            RUN_ID="$(ls runs | sort | tail -n 1)"
            python3 -m model_failure_lab report --run "$RUN_ID"
          fi
