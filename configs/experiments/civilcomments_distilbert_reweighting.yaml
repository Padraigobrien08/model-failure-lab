experiment_name: civilcomments_distilbert_reweighting
experiment_group: mitigations
experiment_type: mitigation
dataset_name: civilcomments
model_name: distilbert
data_config: configs/data/civilcomments.yaml
model_config: configs/model/distilbert.yaml
train_config: configs/train/default.yaml
eval_config: configs/eval/default.yaml
tags:
  - mitigation
  - distilbert
  - reweighting
notes: CivilComments DistilBERT reweighting scaffold preset.
mitigation:
  method: reweighting
  parent_model_name: distilbert
  comparison_tolerances:
    id_macro_f1_max_drop: 0.01
    overall_macro_f1_max_drop: 0.01
    ece_neutral_tolerance: 0.005
  reweighting:
    grouping_field: group_id
    strategy: inverse_sqrt_frequency
    max_weight: 5.0
    normalize_mean: 1.0
