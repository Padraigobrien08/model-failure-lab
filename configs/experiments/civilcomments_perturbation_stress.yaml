experiment_name: civilcomments_perturbation_stress
experiment_group: baselines
experiment_type: perturbation_eval
dataset_name: civilcomments
model_name: logistic_tfidf
data_config: configs/data/civilcomments.yaml
model_config: configs/model/logistic_tfidf.yaml
train_config: configs/train/default.yaml
eval_config: configs/eval/default.yaml
tags:
  - perturbation
  - synthetic_stress
notes: Deterministic synthetic perturbation stress preset for saved-run evaluation.
perturbation:
  source_split: validation
  max_source_samples: 250
  families:
    - typo_noise
    - format_degradation
    - slang_rewrite
  severities:
    - low
    - medium
    - high
  selection_seed: 13
  perturbation_seed: 13
  default_family_order:
    - typo_noise
    - format_degradation
    - slang_rewrite
  slang_mapping_name: default
  output_tag:
